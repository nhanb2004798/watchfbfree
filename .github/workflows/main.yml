name: Update Hoa Dao TV M3U

on:
  schedule:
    - cron: '*/20 * * * *' # Chạy mỗi 20 phút
  workflow_dispatch: # Nút bấm chạy tay

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Libs
        run: pip install requests beautifulsoup4

      - name: Run Script
        run: python hoadao_crawler.py

      - name: Push to Github
        run: |
          git config --local user.email "bot@github.com"
          git config --local user.name "Auto Bot"
          git add watchfrhd.m3u
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto Update $(date)" && git push)
